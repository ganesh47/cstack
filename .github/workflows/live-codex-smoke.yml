name: Live Codex Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-codex-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: self-hosted
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Confirm Codex CLI is available on the runner
        run: codex --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run live Codex smoke workflow
        env:
          CSTACK_SMOKE_REPO: https://github.com/ganesh47/sqlite-metadata-proposal.git
        run: npm run smoke:live

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Validate requested version
        shell: bash
        run: |
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}"
            exit 1
          fi

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Bump package version
        run: npm version "${VERSION}" --no-git-tag-version

      - name: Update README release examples
        run: node scripts/update-release-version.mjs "${VERSION}"

      - name: Verify repository after version update
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release preparation
        shell: bash
        run: |
          git add package.json package-lock.json README.md
          git commit -m "chore: prepare release ${TAG}"

      - name: Create release tag
        run: git tag "${TAG}"

      - name: Push commit and tag
        run: |
          git push origin "HEAD:${DEFAULT_BRANCH}"
          git push origin "${TAG}"

      - name: Pack release tarball
        shell: bash
        run: |
          mkdir -p release
          PACKAGE_FILE="$(npm pack --pack-destination release | tail -n 1)"
          cp "release/${PACKAGE_FILE}" "release/cstack-latest.tgz"
          echo "PACKAGE_FILE=${PACKAGE_FILE}" >> "$GITHUB_ENV"

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          sha256sum "${PACKAGE_FILE}" cstack-latest.tgz > SHA256SUMS.txt

      - name: Generate release notes
        shell: bash
        run: |
          cat > release/RELEASE_NOTES.md <<EOF
          ## Install

          Requirements:
          - Node.js 22+
          - Codex CLI installed and available on \`PATH\`

          Install directly from this GitHub release:

          \`\`\`bash
          npm install -g https://github.com/ganesh47/cstack/releases/download/${TAG}/${PACKAGE_FILE}
          \`\`\`

          Install using the stable latest asset:

          \`\`\`bash
          npm install -g https://github.com/ganesh47/cstack/releases/latest/download/cstack-latest.tgz
          \`\`\`

          Download first, then install locally:

          \`\`\`bash
          curl -LO https://github.com/ganesh47/cstack/releases/download/${TAG}/${PACKAGE_FILE}
          npm install -g ./${PACKAGE_FILE}
          \`\`\`

          Verify the download:

          \`\`\`bash
          curl -LO https://github.com/ganesh47/cstack/releases/download/${TAG}/SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          ## What is in this release

          - packaged CLI entrypoint
          - compiled \`dist/\` runtime
          - current README and install guidance
          EOF

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${TAG}" \
            "release/${PACKAGE_FILE}" \
            "release/cstack-latest.tgz" \
            "release/SHA256SUMS.txt" \
            --title "cstack ${TAG}" \
            --notes-file release/RELEASE_NOTES.md

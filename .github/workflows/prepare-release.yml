name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      RELEASE_BRANCH: release/v${{ inputs.version }}-${{ github.run_id }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Validate requested version
        shell: bash
        run: |
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}"
            exit 1
          fi

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Check current package version
        run: |
          echo "CURRENT_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          echo "BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Create release branch
        run: |
          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          git checkout -b "${RELEASE_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Bump package version
        shell: bash
        run: |
          if [ "${CURRENT_VERSION}" = "${VERSION}" ]; then
            echo "package.json already at ${VERSION}; keeping current version."
            exit 0
          fi
          npm version "${VERSION}" --no-git-tag-version

      - name: Update README release examples
        run: node scripts/update-release-version.mjs "${VERSION}"

      - name: Verify repository after version update
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run ci:e2e

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release preparation
        id: commit
        shell: bash
        run: |
          git add package.json package-lock.json README.md
          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: prepare release ${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push release preparation commit
        run: |
          if [ "${{ steps.commit.outputs.created }}" = "true" ]; then
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi

      - name: Dispatch CI for pushed release commit
        if: steps.commit.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"
          gh workflow run ci.yml \
            --ref "${RELEASE_BRANCH}" \
            -f base_ref="${BASE_SHA}" \
            -f head_ref="${RELEASE_SHA}"

      - name: Dispatch CodeQL for pushed release commit
        if: steps.commit.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh workflow run codeql.yml --ref "${RELEASE_BRANCH}"

      - name: Dispatch Gitleaks for pushed release commit
        if: steps.commit.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh workflow run secrets.yml --ref "${RELEASE_BRANCH}"

      - name: Wait for required checks on pushed release commit
        if: steps.commit.outputs.created == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          REQUIRED_CHECKS=("validate" "dependency-review" "CodeQL" "Gitleaks")
          RELEASE_SHA="$(git rev-parse HEAD)"
          MAX_ATTEMPTS=180

          get_check_state() {
            local check_name="$1"
            gh api "repos/${REPOSITORY}/commits/${RELEASE_SHA}/check-runs?per_page=100" \
              | jq -r --arg name "${check_name}" '
                  [.check_runs[]
                   | select(.name == $name)
                   | {id, status, conclusion}]
                  | sort_by(.id)
                  | last
                  | if . == null then
                      "missing\t"
                    else
                      "\(.status)\t\(.conclusion // "")"
                    end
                '
          }

          for _ in $(seq 1 "${MAX_ATTEMPTS}"); do
            pending_checks=()
            failed_checks=()

            for check_name in "${REQUIRED_CHECKS[@]}"; do
              check_state="$(get_check_state "${check_name}" || true)"
              check_status="${check_state%%$'\t'*}"
              check_conclusion="${check_state#*$'\t'}"

              if [ -z "${check_state}" ] || [ "${check_status}" = "missing" ]; then
                pending_checks+=("${check_name}")
                continue
              fi

              if [ "${check_status}" != "completed" ]; then
                pending_checks+=("${check_name}")
                continue
              fi

              if [ "${check_conclusion}" != "success" ]; then
                failed_checks+=("${check_name}:${check_conclusion:-unknown}")
              fi
            done

            if [ "${#failed_checks[@]}" -gt 0 ]; then
              printf 'Required check failure(s): %s\n' "${failed_checks[*]}"
              exit 1
            fi

            if [ "${#pending_checks[@]}" -eq 0 ]; then
              echo "All required checks passed for ${RELEASE_SHA}."
              exit 0
            fi

            echo "Waiting for required checks: ${pending_checks[*]}"
            sleep 10
          done

          echo "Timed out waiting for required checks on ${RELEASE_SHA}."
          exit 1

      - name: Create release tag
        run: git tag "${TAG}"

      - name: Push release tag
        run: git push origin "${TAG}"

      - name: Dispatch release workflow
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml -f tag="${TAG}"

name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      TAG: v${{ inputs.version }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: npm

      - name: Validate requested version
        shell: bash
        run: |
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}"
            exit 1
          fi

      - name: Ensure release tag does not already exist
        shell: bash
        run: |
          git fetch --tags --force
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Check current package version
        run: echo "CURRENT_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Bump package version
        shell: bash
        run: |
          if [ "${CURRENT_VERSION}" = "${VERSION}" ]; then
            echo "package.json already at ${VERSION}; keeping current version."
            exit 0
          fi
          npm version "${VERSION}" --no-git-tag-version

      - name: Update README release examples
        run: node scripts/update-release-version.mjs "${VERSION}"

      - name: Verify repository after version update
        run: |
          npm run typecheck
          npm test
          npm run build
          npm run ci:e2e

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release preparation
        id: commit
        shell: bash
        run: |
          git add package.json package-lock.json README.md
          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: prepare release ${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: git tag "${TAG}"

      - name: Push commit and tag
        run: |
          if [ "${{ steps.commit.outputs.created }}" = "true" ]; then
            git push origin "HEAD:${DEFAULT_BRANCH}"
          fi
          git push origin "${TAG}"

      - name: Note release handoff
        run: echo "Tag ${TAG} pushed; the Release workflow will publish the GitHub release."

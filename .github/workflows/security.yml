name: Security Intelligence

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-intelligence
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Run npm audit
        shell: bash
        continue-on-error: true
        run: |
          npm audit --json > reports/npm-audit.json

      - name: Install OSV-Scanner
        shell: bash
        run: |
          set -euo pipefail
          version="v2.3.5"
          base_url="https://github.com/google/osv-scanner/releases/download/${version}"
          curl -fsSLo /tmp/osv-scanner "${base_url}/osv-scanner_linux_amd64"
          curl -fsSLo /tmp/osv-scanner_SHA256SUMS "${base_url}/osv-scanner_SHA256SUMS"
          expected="$(grep 'osv-scanner_linux_amd64$' /tmp/osv-scanner_SHA256SUMS | awk '{print $1}')"
          actual="$(sha256sum /tmp/osv-scanner | awk '{print $1}')"
          if [ "${expected}" != "${actual}" ]; then
            echo "OSV-Scanner checksum mismatch"
            exit 1
          fi
          install -m 0755 /tmp/osv-scanner "${RUNNER_TEMP}/osv-scanner"

      - name: Run OSV-Scanner
        shell: bash
        continue-on-error: true
        run: |
          "${RUNNER_TEMP}/osv-scanner" --format sarif -L package-lock.json > reports/osv-scanner.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: reports/sbom.spdx.json
          upload-artifact: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: reports/scorecard.sarif
          results_format: sarif
          publish_results: false
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_mode: archive

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-reports
          path: reports/
          if-no-files-found: error
          retention-days: 14

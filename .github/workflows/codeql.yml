name: CodeQL

on:
  pull_request:
    paths-ignore:
      - dist/**
      - test/fixtures/**
      - .cstack/**
  push:
    branches:
      - main
    paths-ignore:
      - dist/**
      - test/fixtures/**
      - .cstack/**
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45

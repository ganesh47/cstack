name: Gitleaks

on:
  pull_request:
    paths-ignore:
      - dist/**
      - test/fixtures/**
      - .cstack/**
  push:
    branches:
      - main
    paths-ignore:
      - dist/**
      - test/fixtures/**
      - .cstack/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            zricethezav/gitleaks:latest detect \
            --source=/src \
            --exit-code=1 \
            --redact \
            --report-format=sarif \
            --report-path=/src/gitleaks.sarif

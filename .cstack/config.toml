[codex]
sandbox = "workspace-write"

[workflows.spec.delegation]
enabled = false
maxAgents = 0

[workflows.discover.delegation]
enabled = true
maxAgents = 2

[workflows.deliver.github]
enabled = true
command = "gh"
repository = "ganesh47/cstack"
mode = "merge-ready"
createRelease = false
releaseMessage = ""
releaseName = ""
releasePrerelease = false
releaseDraft = false
releaseGenerateNotes = true
releasePushTag = false
releaseFiles = []
pushBranch = true
branchPrefix = "cstack"
commitChanges = true
createPullRequest = true
updatePullRequest = true
pullRequestBase = "main"
pullRequestDraft = false
watchChecks = true
checkWatchTimeoutSeconds = 600
checkWatchPollSeconds = 15
prRequired = true
requireApprovedReview = true
linkedIssuesRequired = false
requiredIssueState = "linked"
requiredChecks = []
requiredWorkflows = []
requireRelease = false
requireTag = false
requireVersionMatch = false
requireChangelog = false
changelogPaths = ["README.md"]

[workflows.deliver.github.security]
requireDependabot = false
requireCodeScanning = false
blockSeverities = ["high", "critical"]
